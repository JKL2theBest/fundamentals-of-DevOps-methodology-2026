services:
  app1:
    build:
      context: ./app1
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install -r requirements.txt
        COPY app.py .
        CMD ["python", "app.py"]
    # Порты наружу не пробрасываем! Доступ только через Nginx.

  app2:
    build:
      context: ./app2
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install -r requirements.txt
        COPY app.py .
        CMD ["python", "app.py"]

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./static1:/var/www/static1:ro
      - ./static2:/var/www/static2:ro
    depends_on:
      - app1
      - app2
