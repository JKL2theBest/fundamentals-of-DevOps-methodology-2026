services:
  app1:
    build: ./app1
    # Порты наружу не пробрасываем! Доступ только через Nginx.

  app2:
    build: ./app2

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./static1:/var/www/static1:ro
      - ./static2:/var/www/static2:ro
    depends_on:
      - app1
      - app2

networks:
  internal:
    driver: bridge

services:
  nginx:
    networks: [internal]
